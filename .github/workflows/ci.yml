name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build hdi from source
        run: ./build
      - name: Check hdi is up to date
        run: |
          if ! git diff --quiet hdi; then
            echo "Error: hdi is out of date — run ./build and commit"
            git diff hdi
            exit 1
          fi

  lint:
    name: Shellcheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: command -v shellcheck || sudo apt-get update -qq && sudo apt-get install -qq -y shellcheck
      - name: Run shellcheck
        run: shellcheck hdi

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core
          else
            sudo apt-get update -qq && sudo apt-get install -qq -y bats
          fi

      - name: Run tests
        run: bats test/hdi.bats

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: site
        run: npx playwright test

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7
